<div class="visitor-chip">
  <span class="visitor-chip__label">visitors</span>
  <strong class="visitor-chip__count" id="blog_visitor">… / …</strong>
</div>
<script>
  fetch('https://getanalyticsstats-5ubwd3taqq-du.a.run.app/')
    .then(function (response) { return response.json(); })
    .then(function (data) {
      var el = document.getElementById('blog_visitor');
      if (el) { el.textContent = data.yesterday + ' / ' + data.total; }
    })
    .catch(function () {
      var el = document.getElementById('blog_visitor');
      if (el) { el.textContent = '- / -'; }
    });
</script>
